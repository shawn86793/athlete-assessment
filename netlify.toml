[functions]
external_node_modules = ["@neondatabase/serverless"]

[build.environment]
NPM_FLAGS = "--include=dev"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    # X-Frame-Options: DENY was replaced with the CSP frame-ancestors directive
    # below — same clickjacking protection, but X-Frame-Options: DENY was also
    # blocking Cypress (which loads the AUT in its own iframe test runner).
    # Browsers honour frame-ancestors over X-Frame-Options when both are present.
    Content-Security-Policy = "frame-ancestors 'self'"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML pages must never be served stale by CDN nodes.
# s-maxage=0 tells shared/edge caches to always revalidate with origin;
# max-age=0,must-revalidate tells browsers to revalidate too.
# This ensures a Netlify deploy reaches every visitor immediately.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, s-maxage=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, s-maxage=0, must-revalidate"

# Service worker must never be cached by CDN or browser —
# a stale SW means users run old code even after a deploy.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, s-maxage=0, must-revalidate"
    Service-Worker-Allowed = "/"

# Web app manifest — short cache so icon/name changes propagate quickly.
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=3600, s-maxage=3600"
    Content-Type  = "application/manifest+json; charset=utf-8"

[[redirects]]
  from   = "/api/seasons/:seasonId/calendar.ics"
  to     = "/.netlify/functions/season-calendar"
  status = 200

[[redirects]]
  from   = "/api/seasons/save"
  to     = "/.netlify/functions/season-save"
  status = 200

[[redirects]]
  from   = "/register"
  to     = "/register.html"
  status = 200

[[redirects]]
  from   = "/admin"
  to     = "/admin.html"
  status = 200

# Cypress plugin disabled — runs locally only
