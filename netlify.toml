[functions]
external_node_modules = ["@neondatabase/serverless"]

[build.environment]
NPM_FLAGS = "--include=dev"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    # X-Frame-Options: DENY was replaced with the CSP frame-ancestors directive
    # below — same clickjacking protection, but X-Frame-Options: DENY was also
    # blocking Cypress (which loads the AUT in its own iframe test runner).
    # Browsers honour frame-ancestors over X-Frame-Options when both are present.
    Content-Security-Policy = "frame-ancestors 'self'"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from   = "/api/seasons/:seasonId/calendar.ics"
  to     = "/.netlify/functions/season-calendar"
  status = 200

[[redirects]]
  from   = "/api/seasons/save"
  to     = "/.netlify/functions/season-save"
  status = 200

[[redirects]]
  from   = "/register"
  to     = "/register.html"
  status = 200

[[redirects]]
  from   = "/admin"
  to     = "/admin.html"
  status = 200

# Cypress plugin disabled — runs locally only
# [[plugins]]
# package = "netlify-plugin-cypress"
