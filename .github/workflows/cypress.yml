name: Cypress Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  cypress:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write cypress.env.json
        run: |
          cat > cypress.env.json <<EOF
          {
            "COACH_EMAIL": "${{ secrets.CYPRESS_COACH_EMAIL }}",
            "COACH_PASSWORD": "${{ secrets.CYPRESS_COACH_PASSWORD }}",
            "ADMIN_EMAIL": "${{ secrets.CYPRESS_ADMIN_EMAIL }}",
            "ADMIN_PASSWORD": "${{ secrets.CYPRESS_ADMIN_PASSWORD }}"
          }
          EOF

      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          # Tests run against the live production site — no server spin-up needed
          browser: chrome
          headed: false
        env:
          CYPRESS_baseUrl: https://athleteassessmentsystems.netlify.app

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          retention-days: 7

      - name: Upload videos on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: cypress/videos
          retention-days: 7
